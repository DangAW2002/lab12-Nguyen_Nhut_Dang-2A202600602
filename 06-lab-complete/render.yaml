services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: free # Change to free plan to avoid costs
    dockerContext: 06-lab-complete
    dockerfilePath: 06-lab-complete/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: COMPATIBLE_BASE_URL
        sync: false
      - key: COMPATIBLE_API_KEY
        sync: false
      - key: COMPATIBLE_MODEL_NAME
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_BUDGET_USD
        value: "5.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"

  - type: web
    name: vaccine-assistant-frontend-personal
    runtime: node
    region: singapore
    plan: free
    rootDir: 06-lab-complete/frontend
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: NITRO_PRESET
        value: render_com

